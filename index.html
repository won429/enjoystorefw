<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>엔조이 앱스토어</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 스크롤바 감추기 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-gray-100 flex justify-center items-center font-sans overflow-hidden">
  
  <!-- 전체 컨테이너 -->
  <div class="w-full h-[100dvh] max-w-[400px] mx-auto bg-white relative overflow-hidden flex flex-col sm:shadow-2xl sm:border-x border-gray-100">
    
    <!-- 메인 컨텐츠 영역 -->
    <main id="main-content" class="flex-1 overflow-y-auto scrollbar-hide bg-white" style="-ms-overflow-style: none; scrollbar-width: none;"></main>

    <!-- 하단 네비게이션 바 -->
    <div class="absolute bottom-6 left-0 w-full px-4 flex justify-center z-30 pointer-events-none pb-[env(safe-area-inset-bottom)]">
      <nav id="bottom-nav" class="pointer-events-auto w-full max-w-[320px] h-[72px] rounded-full flex justify-between items-center px-2 shadow-[0_20px_40px_rgba(0,0,0,0.15),inset_0_2px_5px_rgba(255,255,255,0.9),inset_0_-2px_5px_rgba(255,255,255,0.4)] border border-white/60 bg-white/40 backdrop-blur-3xl">
      </nav>
    </div>

    <!-- 앱 상세 화면 모달 -->
    <div id="modal-container" class="absolute inset-0 bg-white z-50 overflow-y-auto scrollbar-hide animate-slide-up pb-10 hidden block">
    </div>

  </div>

  <script>
    // --- 앱 데이터 ---
    const APPS = [
      {
        id: 'enjoy_main',
        cardHeader: '추억을 떠올리고 싶다면',
        badge: '출시 예정',
        updateTag: '대규모 업데이트',
        bannerTitle: '은랑 LV.999 등장!',
        bannerSubtitle: '<엔조이> 신규 업데이트 출시.',
        title: '엔조이',
        subtitle: '은하 판타지 RPG (소셜)',
        category: '소셜 네트워킹',
        rating: '0',
        ratingCount: '0',
        age: '15+',
        ageDesc: '앱 내 제어',
        chart: '#2',
        chartCategory: '소셜',
        developer: 'enjoy Corp.',
        size: '151.5 MB',
        compatibility: '이 iPhone에서 사용 가능',
        language: '한국어 외 9개',
        inAppPurchase: '사용 가능',
        version: '1.260416.0',
        updatedAt: '2일 전',
        releaseNotes: '',
        buttonText: '출시예정',
        bgClass: "bg-gradient-to-br from-purple-400 via-purple-500 to-indigo-500",
        overlayClass: "bg-[#6d28d9]", 
        iconBg: "bg-gradient-to-br from-pink-500 to-rose-600",
        iconText: "E",
        screenshots: [
          {
            title: "간편 매칭",
            titleColor: "text-rose-700",
            desc: "나에게 최적화된 매칭 UI로\n새로운 인연을 찾아보세요.",
            bg: "bg-rose-50",
            mockupColor: "bg-gradient-to-b from-rose-400 to-pink-500",
            imageUrl: "https://github.com/won429/enjoystorefw/blob/main/kia.png?raw=true"
          },
          {
            title: "안전한 대화",
            titleColor: "text-rose-700",
            desc: "철저한 인증 시스템으로\n안심하고 대화할 수 있습니다.",
            bg: "bg-pink-50",
            mockupColor: "bg-gradient-to-b from-pink-400 to-purple-400",
            imageUrl: "https://github.com/won429/enjoystorefw/blob/main/samsung.png?raw=true"
          }
        ],
      },
      {
        id: 'enjoy_sports',
        cardHeader: '야구팬들은 못참쥐',
        badge: '',
        updateTag: '모두에게 사랑받는 앱',
        bannerTitle: 'Zen Color',
        bannerSubtitle: '평온한 휴식처를 만들어보세요.',
        title: 'KBO (엔조이스포츠)',
        subtitle: '힐링 성인 색칠북 (스포츠)',
        category: '스포츠',
        rating: '4.6',
        ratingCount: '4.6천',
        age: '전체',
        ageDesc: '세',
        chart: '#33',
        chartCategory: '교육',
        developer: 'EBS(한국교육방송공사)',
        size: '52.8 MB',
        compatibility: '이 iPhone에서 사용 가능',
        language: '한국어 외 2개',
        inAppPurchase: '사용 가능',
        version: '1.5.0',
        updatedAt: '1주 전',
        releaseNotes: '학습에 최적화된 UI 구성으로 일부 기능을 개선했습니다.',
        buttonText: '받기',
        bgClass: "bg-gradient-to-br from-teal-200 via-emerald-300 to-teal-500",
        overlayClass: "bg-[#336b64]", 
        iconBg: "bg-blue-600",
        iconText: "K",
        screenshots: [
          {
            title: "간편 홈",
            titleColor: "text-indigo-800",
            desc: "시청에 최적화된 UI 구성으로\n최근 시청한 경기 이어보기 등의\n기능을 제공합니다.",
            bg: "bg-[#eaf5f4]", 
            mockupColor: "bg-blue-600"
          },
          {
            title: "UI 업데이트",
            titleColor: "text-indigo-800",
            desc: "중계만 시청할 수 있도록\n야구 데이터 위주로\n새롭게 개편했습니다.",
            bg: "bg-[#eef2f6]",
            mockupColor: "bg-[#1f2940]"
          }
        ],
      }
    ];

    // --- 상태 관리 ---
    let activeTab = '투데이';
    let searchQuery = '';
    let selectedApp = null;

    // --- 렌더링 함수 ---
    function renderAll() {
      renderMain();
      renderNav();
      lucide.createIcons();
    }

    function renderMain() {
      const mainEl = document.getElementById('main-content');
      if (activeTab === '투데이') {
        mainEl.innerHTML = getTodayHTML();
      } else if (activeTab === '앱') {
        mainEl.innerHTML = getAppsHTML('인기 앱');
      } else if (activeTab === '검색') {
        mainEl.innerHTML = getSearchHTML();
      }
    }

    // --- HTML 생성기 ---
    function getTodayHTML() {
      return `
        <section class="px-4 pb-32 pt-12 sm:pt-6 flex flex-col gap-8">
          <div class="px-2 mb-2">
            <h1 class="text-[32px] font-extrabold tracking-tight text-gray-900">투데이</h1>
          </div>
          ${APPS.map(app => `
            <div class="flex flex-col gap-3">
              <h2 class="text-[22px] font-bold text-gray-900 px-1 tracking-tight">${app.cardHeader}</h2>
              <div 
                class="w-full h-[420px] rounded-[24px] overflow-hidden flex flex-col shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-black/5 cursor-pointer transform active:scale-95 transition-transform flex-shrink-0 relative"
                onclick="openApp('${app.id}')"
              >
                <div class="flex-1 relative ${app.bgClass} flex items-center justify-center overflow-hidden">
                  ${app.badge ? `<div class="absolute top-0 left-0 bg-[#8b3dff] text-white text-[12px] font-bold px-3 py-1.5 rounded-br-[16px] z-10 shadow-sm">${app.badge}</div>` : ''}
                  <div class="absolute w-full h-full opacity-20 flex items-center justify-center mix-blend-overlay">
                     <div class="text-[180px] font-black italic">${app.iconText}</div>
                  </div>
                </div>
                
                <div class="${app.overlayClass} flex flex-col text-white pb-4">
                  <div class="px-4 pt-4 pb-3">
                    <div class="text-[11px] text-white/90 font-bold mb-0.5">${app.updateTag}</div>
                    <h2 class="text-[24px] font-extrabold mb-0.5 tracking-tight leading-tight">${app.bannerTitle}</h2>
                    <p class="text-[12px] text-white/80">${app.bannerSubtitle}</p>
                  </div>
                  <div class="flex items-center justify-between px-4">
                    <div class="flex items-center gap-3">
                      <div class="w-12 h-12 ${app.iconBg} rounded-[10px] flex items-center justify-center text-white text-[20px] font-bold shadow-sm">
                        ${app.iconText}
                      </div>
                      <div class="flex flex-col">
                        <span class="text-[13px] font-bold mb-0.5">${app.title}</span>
                        <span class="text-[11px] text-white/70">${app.subtitle}</span>
                      </div>
                    </div>
                    <div class="flex flex-col items-center">
                      <button 
                        onclick="event.stopPropagation(); openApp('${app.id}');"
                        class="bg-white/20 hover:bg-white/30 backdrop-blur-md w-auto px-4 min-w-[64px] py-1.5 rounded-full text-[13px] font-bold transition mb-1 whitespace-nowrap"
                      >
                        ${app.buttonText || '받기'}
                      </button>
                      <span class="text-[9px] text-white/60 font-medium">앱 내 구입</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </section>
      `;
    }

    function getAppsHTML(title) {
      return `
        <section class="px-5 pb-32 pt-12 sm:pt-8">
          <h2 class="text-[24px] font-extrabold text-gray-900 mb-5">${title} 차트</h2>
          <div class="flex flex-col gap-4">
            ${APPS.map((app, index) => `
              <div class="flex items-center gap-3 cursor-pointer group" onclick="openApp('${app.id}')">
                <div class="w-4 text-center font-bold text-gray-900 text-[15px]">${index + 1}</div>
                <div class="w-[52px] h-[52px] flex-shrink-0 ${app.iconBg} rounded-[12px] flex items-center justify-center text-white text-xl font-black shadow-sm group-hover:scale-105 transition-transform">
                  ${app.iconText}
                </div>
                <div class="flex-1 border-b border-gray-100 pb-4 flex justify-between items-center">
                  <div>
                    <h4 class="font-semibold text-gray-900 text-[14px] mb-0.5">${app.title}</h4>
                    <p class="text-[12px] text-gray-500">${app.category}</p>
                  </div>
                  <button onclick="event.stopPropagation(); openApp('${app.id}');" class="bg-gray-100 hover:bg-gray-200 text-blue-600 px-4 py-1 rounded-full text-[12px] font-bold transition whitespace-nowrap">
                    ${app.buttonText || '받기'}
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function getSearchHTML() {
      return `
        <section class="px-5 pt-12 sm:pt-8 pb-32">
          <h2 class="text-[24px] font-extrabold text-gray-900 mb-3">검색</h2>
          <div class="relative mb-5">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="search" style="width:16px;height:16px;"></i>
            </div>
            <input 
              id="search-input"
              type="text" 
              placeholder="게임, 앱, 스토리 등" 
              value="${searchQuery}"
              oninput="window.handleSearch(this.value)"
              class="w-full bg-gray-100 text-gray-900 text-[14px] rounded-full py-2 pl-9 pr-9 outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
            />
            <button id="search-clear-btn" onclick="window.clearSearch()" class="absolute inset-y-0 right-3 flex items-center text-gray-400 ${searchQuery ? '' : 'hidden'}">
              <i data-lucide="x" style="width:16px;height:16px;"></i>
            </button>
          </div>
          <div id="search-results-container">
            ${getSearchResultsHTML()}
          </div>
        </section>
      `;
    }

    function getSearchResultsHTML() {
      if (searchQuery === '') {
        return `
          <div>
            <h3 class="text-[16px] font-bold text-gray-900 mb-3">추천 검색어</h3>
            <div class="flex flex-wrap gap-2">
              ${["엔조이", "KBO", "야구", "소개팅"].map(term => `
                <button onclick="window.setSearchQuery('${term}')" class="bg-white border border-gray-200 text-blue-500 px-3 py-1.5 rounded-full text-[13px] hover:bg-gray-50 transition-colors flex items-center gap-1.5">
                  <i data-lucide="search" style="width:12px;height:12px;"></i>${term}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }

      const filtered = APPS.filter(app => 
        app.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
        app.category.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return `
        <div class="flex flex-col gap-4">
          ${filtered.length > 0 ? filtered.map(app => `
            <div class="flex items-center gap-3 cursor-pointer" onclick="openApp('${app.id}')">
              <div class="w-[52px] h-[52px] ${app.iconBg} rounded-[12px] flex items-center justify-center text-white text-xl font-black shadow-sm">${app.iconText}</div>
              <div class="flex-1 flex justify-between items-center border-b border-gray-100 pb-3">
                <div>
                  <h4 class="font-semibold text-gray-900 text-[14px]">${app.title}</h4>
                  <p class="text-[12px] text-gray-500">${app.category}</p>
                </div>
                <button class="bg-gray-100 text-blue-600 px-4 py-1 rounded-full text-[12px] font-bold whitespace-nowrap">${app.buttonText || '받기'}</button>
              </div>
            </div>
          `).join('') : '<div class="text-center py-10 text-gray-400 text-sm">검색 결과가 없습니다.</div>'}
        </div>
      `;
    }

    function renderNav() {
      const navEl = document.getElementById('bottom-nav');
      
      const icons = {
        '투데이': (active) => `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="3"></rect><line x1="4" y1="8" x2="20" y2="8"></line><rect x="7" y="11.5" width="10" height="7" rx="1.5" fill="${active ? 'currentColor' : 'none'}" stroke="${active ? 'none' : 'currentColor'}"></rect></svg>`,
        '앱': () => `<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 12l10 5 10-5-2.5-1.25L12 14.5 4.5 10.75 2 12z"></path><path d="M2 17l10 5 10-5-2.5-1.25L12 19.5 4.5 15.75 2 17z"></path></svg>`,
        '검색': () => `<svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>`
      };

      navEl.innerHTML = ['투데이', '앱', '검색'].map(tab => {
        const active = activeTab === tab;
        return `
          <div class="relative flex-1 h-[56px] flex justify-center items-center">
            ${active ? '<div class="absolute w-[88%] h-[100%] bg-white/60 backdrop-blur-md rounded-full z-0 shadow-sm border border-white/60"></div>' : ''}
            <button 
              onclick="window.setTab('${tab}')"
              class="relative flex flex-col items-center justify-center gap-[2px] w-full h-full z-10 ${active ? 'text-[#1C68F2]' : 'text-gray-600'}"
            >
              <div class="transition-transform duration-200 ${active ? 'scale-105' : 'scale-100'}">
                ${icons[tab](active)}
              </div>
              <span class="text-[11px] font-[800] tracking-tight">${tab}</span>
            </button>
          </div>
        `;
      }).join('');
    }

    function renderModal() {
      const container = document.getElementById('modal-container');
      if (!selectedApp) {
        container.classList.add('hidden');
        container.innerHTML = '';
        return;
      }

      const app = selectedApp;
      
      // 별점 생성기
      let starsHTML = '';
      for(let i=1; i<=5; i++) {
        starsHTML += `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${i <= Math.floor(app.rating) ? 'text-gray-400' : 'text-gray-200'}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
      }

      // 스크린샷 뷰 생성기
      const screenshotsHTML = app.screenshots.map(s => 
        s.imageUrl ? `
        <div class="w-[260px] sm:w-[280px] h-[460px] flex-shrink-0 rounded-[32px] relative overflow-hidden shadow-sm border border-black/5">
          <img src="${s.imageUrl}" class="w-full h-full object-cover" alt="screenshot" />
        </div>
        ` : `
        <div class="w-[260px] sm:w-[280px] h-[460px] flex-shrink-0 ${s.bg} rounded-[32px] flex flex-col pt-10 relative overflow-hidden shadow-sm border border-black/5">
          <h3 class="text-[22px] font-black ${s.titleColor} mb-2 text-center">${s.title}</h3>
          <p class="text-[14px] text-[#555] text-center px-6 leading-relaxed font-medium">${s.desc.replace(/\n/g, '<br/>')}</p>
          
          <div class="absolute -bottom-6 left-1/2 transform -translate-x-1/2 w-[220px] h-[340px] bg-white rounded-t-[32px] shadow-[0_-5px_20px_rgba(0,0,0,0.06)] border-[6px] border-white overflow-hidden flex flex-col">
            <div class="w-full h-[40px] bg-white flex justify-center items-center relative border-b border-gray-100/80">
              <div class="w-16 h-4 bg-gray-100 rounded-full"></div>
            </div>
            <div class="flex-1 ${s.mockupColor} p-3 flex flex-col gap-2">
              <div class="w-full h-24 bg-white/20 rounded-2xl"></div>
              <div class="w-full h-12 bg-white/20 rounded-xl"></div>
              <div class="w-full h-12 bg-white/20 rounded-xl"></div>
              <div class="w-full flex gap-2">
                <div class="flex-1 h-20 bg-white/20 rounded-xl"></div>
                <div class="flex-1 h-20 bg-white/20 rounded-xl"></div>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="sticky top-0 bg-white/95 backdrop-blur-md z-10 px-4 py-3 flex justify-between items-center">
          <button onclick="window.closeApp()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-800 hover:bg-gray-200 transition">
            <i data-lucide="chevron-left" style="width:20px;height:20px;" stroke-width="2.5"></i>
          </button>
        </div>
        
        <div class="px-5 flex gap-4 mt-1">
          <div class="w-[100px] h-[100px] ${app.iconBg} rounded-[22px] flex items-center justify-center text-white text-4xl font-black shadow-md">
            ${app.iconText}
          </div>
          <div class="flex-1 flex flex-col justify-center">
            <h1 class="text-[20px] font-bold text-gray-900 leading-tight mb-1">${app.title}</h1>
            <p class="text-[13px] text-gray-500 mb-3">${app.developer}</p>
            <button class="bg-blue-500 hover:bg-blue-600 text-white w-auto px-4 min-w-[68px] py-1.5 rounded-full text-[13px] font-bold transition whitespace-nowrap">${app.buttonText || '받기'}</button>
          </div>
        </div>
        
        <!-- 수치 영역 -->
        <div class="mt-6 border-y border-gray-100 py-3 flex overflow-x-auto px-2" style="-ms-overflow-style: none; scrollbar-width: none;">
          <div class="flex flex-col items-center flex-shrink-0 w-[110px]">
            <span class="text-[11px] text-gray-400 font-medium mb-1">${app.ratingCount}개의 평가</span>
            <span class="text-[24px] font-black text-gray-700 leading-none mb-1.5">${app.rating}</span>
            <div class="flex text-gray-400 gap-[1px]">
               ${starsHTML}
            </div>
          </div>
          <div class="w-px h-10 bg-gray-200 flex-shrink-0 self-center"></div>
          
          <div class="flex flex-col items-center flex-shrink-0 w-[100px]">
            <span class="text-[11px] text-gray-400 font-medium mb-1">연령</span>
            <span class="text-[24px] font-black text-gray-700 leading-none mb-1.5">${app.age}</span>
            <span class="text-[11px] text-gray-400 font-medium">${app.ageDesc}</span>
          </div>
          <div class="w-px h-10 bg-gray-200 flex-shrink-0 self-center"></div>
          
          <div class="flex flex-col items-center flex-shrink-0 w-[100px]">
            <span class="text-[11px] text-gray-400 font-medium mb-1">차트</span>
            <span class="text-[24px] font-black text-gray-700 leading-none mb-1.5">${app.chart}</span>
            <span class="text-[11px] text-gray-400 font-medium">${app.chartCategory}</span>
          </div>
          <div class="w-px h-10 bg-gray-200 flex-shrink-0 self-center"></div>

          <div class="flex flex-col items-center flex-shrink-0 w-[110px]">
            <span class="text-[11px] text-gray-400 font-medium mb-1">개발자</span>
            <div class="w-7 h-7 bg-gray-100 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 mb-1">
              <i data-lucide="user" style="width:16px;height:16px;" stroke-width="2.5"></i>
            </div>
            <span class="text-[11px] text-gray-400 font-medium whitespace-nowrap overflow-hidden text-ellipsis w-[90%] text-center">${app.developer}</span>
          </div>
        </div>

        ${app.releaseNotes ? `
        <!-- 새로운 소식 -->
        <div class="px-5 pt-5 pb-2">
           <div class="flex justify-between items-center mb-3 cursor-pointer" onclick="window.openVersionHistory()">
             <h3 class="text-[22px] font-bold text-gray-900 flex items-center">
               새로운 소식 <i data-lucide="chevron-right" class="text-gray-400 ml-1" style="width:24px;height:24px;"></i>
             </h3>
           </div>
           <div class="flex justify-between items-center mb-3">
             <span class="text-[14px] text-gray-500 font-medium">버전 ${app.version}</span>
             <span class="text-[14px] text-gray-500 font-medium">${app.updatedAt}</span>
           </div>
           <p class="text-[15px] text-gray-800 leading-relaxed font-medium">
             ${app.releaseNotes.replace(/\n/g, '<br/>')}
           </p>
        </div>
        ` : ''}

        <!-- 스크린샷 뷰 -->
        <div class="flex gap-4 overflow-x-auto px-5 py-5 mt-2" style="-ms-overflow-style: none; scrollbar-width: none;">
          ${screenshotsHTML}
        </div>

        <!-- 정보 섹션 -->
        <div class="px-5 pb-24 pt-2">
           <h3 class="text-[19px] font-bold text-gray-900 mb-1">정보</h3>
           <div class="flex flex-col">
             <div class="flex justify-between items-center py-3 border-b border-gray-100">
               <span class="text-[13px] text-gray-400 font-medium">제공자</span>
               <span class="text-[13px] text-gray-900 font-medium">${app.developer}</span>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100">
               <span class="text-[13px] text-gray-400 font-medium">크기</span>
               <span class="text-[13px] text-gray-900 font-medium">${app.size}</span>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100">
               <span class="text-[13px] text-gray-400 font-medium">카테고리</span>
               <span class="text-[13px] text-gray-900 font-medium">${app.category}</span>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100 cursor-pointer">
               <span class="text-[13px] text-gray-400 font-medium">호환성</span>
               <div class="flex items-center gap-1">
                 <span class="text-[13px] text-gray-900 font-medium">${app.compatibility}</span>
                 <i data-lucide="chevron-down" class="text-gray-400" style="width:16px;height:16px;"></i>
               </div>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100 cursor-pointer">
               <span class="text-[13px] text-gray-400 font-medium">언어</span>
               <div className="flex items-center gap-1">
                 <span class="text-[13px] text-gray-900 font-medium">${app.language}</span>
                 <i data-lucide="chevron-down" class="text-gray-400" style="width:16px;height:16px;"></i>
               </div>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100 cursor-pointer">
               <span class="text-[13px] text-gray-400 font-medium">연령 등급</span>
               <div class="flex items-center gap-1">
                 <span class="text-[13px] text-gray-900 font-medium">${app.age}</span>
                 <i data-lucide="chevron-down" class="text-gray-400" style="width:16px;height:16px;"></i>
               </div>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100 cursor-pointer">
               <span class="text-[13px] text-gray-400 font-medium">앱 내 구입</span>
               <div class="flex items-center gap-1">
                 <span class="text-[13px] text-gray-900 font-medium">${app.inAppPurchase}</span>
                 <i data-lucide="chevron-down" class="text-gray-400" style="width:16px;height:16px;"></i>
               </div>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100">
               <span class="text-[13px] text-gray-400 font-medium">저작권</span>
               <span class="text-[13px] text-gray-900 font-medium">©2026 ${app.developer}</span>
             </div>

             <div class="flex justify-between items-center py-3 border-b border-gray-100 cursor-pointer group mt-1">
               <span class="text-[13px] text-blue-500 font-medium group-hover:text-blue-600 transition-colors">개발자 웹사이트</span>
               <div class="w-6 h-6 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center group-hover:bg-blue-100 transition-colors">
                 <i data-lucide="compass" style="width:14px;height:14px;" stroke-width="2.5"></i>
               </div>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100 cursor-pointer group">
               <span class="text-[13px] text-blue-500 font-medium group-hover:text-blue-600 transition-colors">개인정보 처리방침</span>
               <div class="w-6 h-6 text-blue-500 flex items-center justify-center group-hover:text-blue-600 transition-colors">
                 <i data-lucide="hand" style="width:16px;height:16px;" stroke-width="2.5"></i>
               </div>
             </div>
             <div class="flex justify-between items-center py-3 border-b border-gray-100 cursor-pointer group">
               <span class="text-[13px] text-blue-500 font-medium group-hover:text-blue-600 transition-colors">사용권 계약</span>
               <div className="w-6 h-6 text-blue-500 flex items-center justify-center group-hover:text-blue-600 transition-colors">
                 <i data-lucide="file-text" style="width:16px;height:16px;" stroke-width="2.5"></i>
               </div>
             </div>
             <div class="flex justify-between items-center py-3 cursor-pointer group">
               <span class="text-[13px] text-blue-500 font-medium group-hover:text-blue-600 transition-colors">문제 리포트</span>
               <div class="w-6 h-6 text-blue-500 flex items-center justify-center group-hover:text-blue-600 transition-colors">
                 <i data-lucide="alert-triangle" style="width:16px;height:16px;" stroke-width="2.5"></i>
               </div>
             </div>

           </div>
        </div>
      `;
      container.classList.remove('hidden');
      
      // DOM 업데이트 후 아이콘 다시 그리기
      setTimeout(() => lucide.createIcons(), 0);
    }

    // --- 글로벌 이벤트 핸들러 ---
    window.setTab = function(tabName) {
      activeTab = tabName;
      searchQuery = '';
      renderMain();
      renderNav();
      lucide.createIcons();
    };

    window.setSearchQuery = function(query) {
      searchQuery = query;
      document.getElementById('search-input').value = query;
      window.handleSearch(query);
    }

    window.handleSearch = function(val) {
      searchQuery = val;
      const resultsContainer = document.getElementById('search-results-container');
      const clearBtn = document.getElementById('search-clear-btn');
      
      if(resultsContainer) {
        resultsContainer.innerHTML = getSearchResultsHTML();
      }
      if(clearBtn) {
        if(searchQuery) clearBtn.classList.remove('hidden');
        else clearBtn.classList.add('hidden');
      }
      setTimeout(() => lucide.createIcons(), 0);
    };

    window.clearSearch = function() {
      searchQuery = '';
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear-btn').classList.add('hidden');
      const resultsContainer = document.getElementById('search-results-container');
      if(resultsContainer) {
        resultsContainer.innerHTML = getSearchResultsHTML();
      }
      setTimeout(() => lucide.createIcons(), 0);
    };

    window.openApp = function(appId) {
      selectedApp = APPS.find(a => a.id === appId);
      renderModal();
    };

    window.closeApp = function() {
      selectedApp = null;
      renderModal();
    };

    window.openVersionHistory = function() {
      if (!selectedApp) return;
      const detailHTML = `
        <div id="version-history-modal" class="absolute inset-0 bg-white z-[60] overflow-y-auto animate-slide-up pb-10">
          <div class="sticky top-0 bg-white/95 backdrop-blur-md z-10 px-4 py-3 flex items-center border-b border-gray-100">
            <button onclick="event.stopPropagation(); document.getElementById('version-history-modal').remove()" class="flex items-center text-blue-500 font-medium">
              <i data-lucide="chevron-left" style="width:24px;height:24px;" stroke-width="2.5"></i> 
              <span class="ml-1 text-[17px]">뒤로</span>
            </button>
            <h1 class="absolute left-1/2 transform -translate-x-1/2 text-[17px] font-bold text-gray-900">버전 기록</h1>
          </div>
          <div class="px-5 py-6">
            <div class="flex justify-between items-center mb-3">
              <span class="text-[16px] font-bold text-gray-900">${selectedApp.version}</span>
              <span class="text-[14px] text-gray-500 font-medium">${selectedApp.updatedAt}</span>
            </div>
            <p class="text-[15px] text-gray-800 leading-relaxed font-medium">
              ${selectedApp.releaseNotes.replace(/\n/g, '<br/>')}
            </p>
          </div>
        </div>
      `;
      document.getElementById('modal-container').insertAdjacentHTML('beforeend', detailHTML);
      lucide.createIcons();
    };

    // --- 초기 렌더링 ---
    renderAll();
  </script>
</body>
</html>
