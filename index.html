    /* 스크롤바 감추기 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-gray-100 flex justify-center items-center font-sans overflow-hidden">
  
  <!-- 전체 컨테이너 -->
  <div class="w-full h-[100dvh] max-w-[400px] mx-auto bg-white relative overflow-hidden flex flex-col sm:shadow-2xl sm:border-x border-gray-100">
    
    <!-- 메인 컨텐츠 영역 -->
    <main id="main-content" class="flex-1 overflow-y-auto scrollbar-hide bg-white" style="-ms-overflow-style: none; scrollbar-width: none;"></main>

    <!-- 하단 네비게이션 바 -->
    <div class="absolute bottom-6 left-0 w-full px-4 flex justify-center z-30 pointer-events-none pb-[env(safe-area-inset-bottom)]">

      </nav>

    <!-- 앱 상세 화면 모달 -->

    </div>

  </div>

    // --- 기기 판별 로직 ---
    function getDeviceCompatibility() {
      const ua = navigator.userAgent;
      let device = 'iPhone'; // 기본값
      if (/iPad/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
        device = 'iPad';
      } else if (/iPhone/i.test(ua)) {
        device = 'iPhone';
      } else if (/Mac/i.test(ua)) {
        device = 'Mac';
      } else if (/SM-|SAMSUNG|Galaxy/i.test(ua) || /Android/i.test(ua)) {
        device = 'Galaxy';
      } else if (/Windows/i.test(ua)) {
        device = 'Windows';
      }
      return '이 ' + device + '에서 사용 가능';
    }
    const currentCompatibility = getDeviceCompatibility();

          {

        screenshots: [

    // --- 상태 관리 ---
    let activeTab = '투데이';
    let searchQuery = '';
    let selectedApp = null;

    // --- 렌더링 함수 ---
    function renderAll() {
      renderMain();
      renderNav();
      lucide.createIcons();
    }

    function renderMain() {
      const mainEl = document.getElementById('main-content');
      if (activeTab === '투데이') {
        mainEl.innerHTML = getTodayHTML();
      } else if (activeTab === '앱') {
        mainEl.innerHTML = getAppsHTML('인기 앱');
      } else if (activeTab === '검색') {
        mainEl.innerHTML = getSearchHTML();
      }
    }

    // --- HTML 생성기 ---
    function getTodayHTML() {
      return `
        <section class="px-4 pb-32 pt-12 sm:pt-6 flex flex-col gap-8">
          <div class="px-2 -mb-6">
            <h1 class="text-[32px] font-extrabold tracking-tight text-gray-900">투데이</h1>
          </div>
          ${APPS.map(app => `
            <div class="flex flex-col gap-3">
              <h2 class="text-[22px] font-bold text-gray-900 px-1 tracking-tight">${app.cardHeader}</h2>
              <div 
                class="w-full h-[420px] rounded-[24px] overflow-hidden flex flex-col shadow-[0_8px_20px_rgba(0,0,0,0.1)] border border-black/5 cursor-pointer transform active:scale-95 transition-transform flex-shrink-0 relative"
                onclick="openApp('${app.id}')"
              >
                <div class="flex-1 relative ${app.bgClass} flex items-center justify-center overflow-hidden">
                  ${app.bannerUrl ? `<img src="${app.bannerUrl}" class="absolute inset-0 w-full h-full object-cover" />` : ''}
                  ${app.badge ? `<div class="absolute top-0 left-0 bg-[#8b3dff] text-white text-[12px] font-bold px-3 py-1.5 rounded-br-[16px] z-10 shadow-sm">${app.badge}</div>` : ''}
                  ${!app.bannerUrl ? `<div class="absolute w-full h-full opacity-20 flex items-center justify-center mix-blend-overlay">
                     <div class="text-[180px] font-black italic">${app.iconText}</div>
                  </div>` : ''}
                </div>
                
                <div class="${app.overlayClass} flex flex-col text-white pb-4">
                  <div class="px-4 pt-4 pb-3">
                    <div class="text-[11px] text-white/90 font-bold mb-0.5">${app.updateTag}</div>
                    <h2 class="text-[24px] font-extrabold mb-0.5 tracking-tight leading-tight">${app.bannerTitle}</h2>
                    <p class="text-[12px] text-white/80">${app.bannerSubtitle}</p>
                  </div>
                  <div class="flex items-center justify-between px-4">
                    <div class="flex items-center gap-3">
                      <div class="w-12 h-12 ${app.iconBg} rounded-[22.5%] flex items-center justify-center text-white text-[20px] font-bold shadow-sm overflow-hidden">
                        ${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover scale-125" />` : app.iconText}
                      </div>
                      <div class="flex flex-col">
                        <span class="text-[13px] font-bold mb-0.5">${app.title}</span>
                        <span class="text-[11px] text-white/70">${app.subtitle}</span>
                      </div>
                    </div>
                    <div class="flex flex-col items-center">
                      ${app.isDownloading ? 
                        `<div class="w-auto min-w-[64px] h-[32px] mb-1 flex items-center justify-center text-white cursor-default" onclick="event.stopPropagation();">
                           <svg class="w-[28px] h-[28px]" viewBox="0 0 36 36">
                             <circle cx="18" cy="18" r="14" fill="none" class="stroke-current opacity-30" stroke-width="2.5"></circle>
                             <circle cx="18" cy="18" r="14" fill="none" class="stroke-current progress-circle-${app.id}" style="transition: stroke-dashoffset 0.1s linear;" stroke-width="2.5" stroke-dasharray="88" stroke-dashoffset="${88 - (88 * (app.progress || 0) / 100)}" stroke-linecap="round" transform="rotate(-90 18 18)"></circle>
                             <rect x="13.5" y="12" width="2.5" height="12" rx="1" fill="currentColor"></rect>
                             <rect x="20" y="12" width="2.5" height="12" rx="1" fill="currentColor"></rect>
                           </svg>
                         </div>` :
                        `<button 
                          onclick="if('${app.buttonText}' !== '완료' && '${app.buttonText}' !== '출시예정') { window.handleDownload(event, '${app.id}'); } else { event.stopPropagation(); }"
                          class="${app.buttonText === '완료' ? 'bg-white/10 text-white/50 cursor-default' : (app.buttonText === '출시예정' ? 'bg-white/20 cursor-default' : 'bg-white/20 hover:bg-white/30')} backdrop-blur-md w-auto px-4 min-w-[64px] py-1.5 rounded-full text-[13px] font-bold transition mb-1 whitespace-nowrap"

                    </div>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </section>
      `;
    }

    function getAppsHTML(title) {
      return `
        <section class="px-5 pb-32 pt-12 sm:pt-8">
          <h2 class="text-[24px] font-extrabold text-gray-900 mb-5">${title} 차트</h2>
          <div class="flex flex-col gap-4">
            ${APPS.map((app, index) => `
              <div class="flex items-center gap-3 cursor-pointer group" onclick="openApp('${app.id}')">
                <div class="w-4 text-center font-bold text-gray-900 text-[15px]">${index + 1}</div>
                <div class="w-[52px] h-[52px] flex-shrink-0 ${app.iconBg} rounded-[22.5%] flex items-center justify-center text-white text-xl font-black shadow-sm group-hover:scale-105 transition-transform overflow-hidden">
                  ${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover scale-125" />` : app.iconText}
                </div>
                <div class="flex-1 border-b border-gray-100 pb-4 flex justify-between items-center">
                  <div>
                    <h4 class="font-semibold text-gray-900 text-[14px] mb-0.5">${app.title}</h4>
                    <p class="text-[12px] text-gray-500">${app.category}</p>
                  </div>
                  ${app.isDownloading ?
                    `<div class="w-[60px] h-[28px] flex items-center justify-center text-blue-600 cursor-default" onclick="event.stopPropagation();">
                       <svg class="w-[28px] h-[28px]" viewBox="0 0 36 36">
                         <circle cx="18" cy="18" r="14" fill="none" class="stroke-current opacity-20" stroke-width="2.5"></circle>
                         <circle cx="18" cy="18" r="14" fill="none" class="stroke-current progress-circle-${app.id}" style="transition: stroke-dashoffset 0.1s linear;" stroke-width="2.5" stroke-dasharray="88" stroke-dashoffset="${88 - (88 * (app.progress || 0) / 100)}" stroke-linecap="round" transform="rotate(-90 18 18)"></circle>

                       </svg>
                     </div>` :
                    `<button onclick="if('${app.buttonText}' !== '완료' && '${app.buttonText}' !== '출시예정') { window.handleDownload(event, '${app.id}'); } else { event.stopPropagation(); }" class="${app.buttonText === '완료' ? 'bg-gray-200 text-gray-400 cursor-default' : (app.buttonText === '출시예정' ? 'bg-gray-100 text-blue-400 cursor-default' : 'bg-gray-100 hover:bg-gray-200 text-blue-600')} px-4 py-1 rounded-full text-[12px] font-bold transition whitespace-nowrap" ${(app.buttonText === '완료' || app.buttonText === '출시예정') ? 'disabled' : ''}>

    function getSearchHTML() {
      return `

          <h2 class="text-[24px] font-extrabold text-gray-900 mb-3">검색</h2>
          <div class="relative mb-5">
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="search" style="width:16px;height:16px;"></i>
            </div>
            <input 
              id="search-input"
              type="text" 
              placeholder="게임, 앱, 스토리 등" 
              value="${searchQuery}"
              oninput="window.handleSearch(this.value)"
              class="w-full bg-gray-100 text-gray-900 text-[14px] rounded-full py-2 pl-9 pr-9 outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
            />
            <button id="search-clear-btn" onclick="window.clearSearch()" class="absolute inset-y-0 right-3 flex items-center text-gray-400 ${searchQuery ? '' : 'hidden'}">
              <i data-lucide="x" style="width:16px;height:16px;"></i>
            </button>
          </div>
          <div id="search-results-container">
            ${getSearchResultsHTML()}
          </div>
        </section>
      `;
    }

    function getSearchResultsHTML() {
      if (searchQuery === '') {
        return `
          <div>
            <h3 class="text-[16px] font-bold text-gray-900 mb-3">추천 검색어</h3>
            <div class="flex flex-wrap gap-2">
              ${["엔조이", "KBO", "야구", "소개팅"].map(term => `
                <button onclick="window.setSearchQuery('${term}')" class="bg-white border border-gray-200 text-blue-500 px-3 py-1.5 rounded-full text-[13px] hover:bg-gray-50 transition-colors flex items-center gap-1.5">
                  <i data-lucide="search" style="width:12px;height:12px;"></i>${term}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }

      const filtered = APPS.filter(app => 
        app.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
        app.category.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return `
        <div class="flex flex-col gap-4">
          ${filtered.length > 0 ? filtered.map(app => `
            <div class="flex items-center gap-3 cursor-pointer" onclick="openApp('${app.id}')">
              <div class="w-[52px] h-[52px] ${app.iconBg} rounded-[22.5%] flex items-center justify-center text-white text-xl font-black shadow-sm overflow-hidden">
                ${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover scale-125" />` : app.iconText}
              </div>
              <div class="flex-1 flex justify-between items-center border-b border-gray-100 pb-3">
                <div>
                  <h4 class="font-semibold text-gray-900 text-[14px]">${app.title}</h4>
                  <p class="text-[12px] text-gray-500">${app.category}</p>
                </div>
                ${app.isDownloading ?
                  `<div class="w-[60px] h-[28px] flex items-center justify-center text-blue-600 cursor-default" onclick="event.stopPropagation();">
                     <svg class="w-[28px] h-[28px]" viewBox="0 0 36 36">
                       <circle cx="18" cy="18" r="14" fill="none" class="stroke-current opacity-20" stroke-width="2.5"></circle>
                       <circle cx="18" cy="18" r="14" fill="none" class="stroke-current progress-circle-${app.id}" style="transition: stroke-dashoffset 0.1s linear;" stroke-width="2.5" stroke-dasharray="88" stroke-dashoffset="${88 - (88 * (app.progress || 0) / 100)}" stroke-linecap="round" transform="rotate(-90 18 18)"></circle>
                       <rect x="13.5" y="12" width="2.5" height="12" rx="1" fill="currentColor"></rect>
                       <rect x="20" y="12" width="2.5" height="12" rx="1" fill="currentColor"></rect>
                     </svg>
                   </div>` :
                  `<button onclick="if('${app.buttonText}' !== '완료' && '${app.buttonText}' !== '출시예정') { window.handleDownload(event, '${app.id}'); } else { event.stopPropagation(); }" class="${app.buttonText === '완료' ? 'bg-gray-200 text-gray-400 cursor-default' : (app.buttonText === '출시예정' ? 'bg-gray-100 text-blue-400 cursor-default' : 'bg-gray-100 text-blue-600')} px-4 py-1 rounded-full text-[12px] font-bold whitespace-nowrap" ${(app.buttonText === '완료' || app.buttonText === '출시예정') ? 'disabled' : ''}>${app.buttonText || '받기'}</button>`
                }
              </div>
            </div>
          `).join('') : '<div class="text-center py-10 text-gray-400 text-sm">검색 결과가 없습니다.</div>'}
        </div>
      `;
    }

    function renderNav() {
      const navEl = document.getElementById('bottom-nav');
      
      const icons = {

          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

            <path d="M4 8.5h16"></path>

          </svg>`,
        '앱': (active) => `
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round">

            <polyline points="4 17 12 21 20 17" stroke-linecap="round"></polyline>
          </svg>`,
        '검색': (active) => `

    // --- 글로벌 이벤트 핸들러 ---
    window.setTab = function(tabName) {
      activeTab = tabName;
      searchQuery = '';
      renderMain();
      renderNav();
      lucide.createIcons();
    };

    window.setSearchQuery = function(query) {
      searchQuery = query;
      document.getElementById('search-input').value = query;
      window.handleSearch(query);
    }

    window.handleSearch = function(val) {
      searchQuery = val;
      const resultsContainer = document.getElementById('search-results-container');
      const clearBtn = document.getElementById('search-clear-btn');
      
      if(resultsContainer) {
        resultsContainer.innerHTML = getSearchResultsHTML();
      }
      if(clearBtn) {
        if(searchQuery) clearBtn.classList.remove('hidden');
        else clearBtn.classList.add('hidden');
      }
      setTimeout(() => lucide.createIcons(), 0);
    };

    window.clearSearch = function() {
      searchQuery = '';
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear-btn').classList.add('hidden');
      const resultsContainer = document.getElementById('search-results-container');
      if(resultsContainer) {
        resultsContainer.innerHTML = getSearchResultsHTML();
      }
      setTimeout(() => lucide.createIcons(), 0);
    };

    window.handleDownload = function(event, appId) {
      if (event) event.stopPropagation();
      const targetApp = APPS.find(a => a.id === appId);
      
      if (targetApp && !targetApp.isDownloading && targetApp.buttonText !== '완료') {
        // 다운로드 상태 시작
        targetApp.isDownloading = true;
        targetApp.progress = 0;
        
        // 프로그레스 바 렌더링
        renderMain();
        if (selectedApp && selectedApp.id === appId) renderModal();
        
        // 애니메이션 작동 (약 1.5초 동안 채워짐)
        const intervalId = setInterval(() => {
          targetApp.progress += 2; // 진행 속도 조절 가능
          
          if (targetApp.progress >= 100) {
            clearInterval(intervalId);
            targetApp.isDownloading = false;
            targetApp.buttonText = '완료';
            
            // 완료 상태 렌더링 및 이 시점에 추후 파일 설치 로직 추가 가능
            renderMain();
            if (selectedApp && selectedApp.id === appId) renderModal();
          } else {
            // 전체 화면 깜빡임 방지를 위해 SVG stroke 속성만 실시간 업데이트
            const circles = document.querySelectorAll('.progress-circle-' + appId);
            circles.forEach(circle => {
              circle.style.strokeDashoffset = 88 - (88 * targetApp.progress / 100);
            });
          }
        }, 30);
      }
    };

    window.openApp = function(appId) {
      selectedApp = APPS.find(a => a.id === appId);
      renderModal();
    };

    window.closeApp = function() {
      selectedApp = null;
      renderModal();
    };

        <div id="version-history-modal" class="absolute inset-0 bg-white z-[60] overflow-y-auto animate-slide-up pb-10">
          <div class="sticky top-0 bg-white/95 backdrop-blur-md z-10 px-4 py-3 flex items-center border-b border-gray-100">
            <button onclick="event.stopPropagation(); document.getElementById('version-history-modal').remove()" class="flex items-center text-blue-500 font-medium">
              <i data-lucide="chevron-left" style="width:24px;height:24px;" stroke-width="2.5"></i> 
              <span class="ml-1 text-[17px]">뒤로</span>
            </button>
            <h1 class="absolute left-1/2 transform -translate-x-1/2 text-[17px] font-bold text-gray-900">버전 기록</h1>
          </div>
          <div class="px-5 py-6">
            <div class="flex justify-between items-center mb-3">
              <span class="text-[16px] font-bold text-gray-900">${selectedApp.version}</span>
              <span class="text-[14px] text-gray-500 font-medium">${selectedApp.updatedAt}</span>
            </div>
            <p class="text-[15px] text-gray-800 leading-relaxed font-medium">
              ${selectedApp.releaseNotes.replace(/\\n/g, '<br/>')}
            </p>
          </div>
        </div>
      `;
      document.getElementById('modal-container').insertAdjacentHTML('beforeend', detailHTML);
      lucide.createIcons();
    };

    window.toggleAccordion = function(content, icon) {
      content.classList.toggle('hidden');
      if (icon) icon.classList.toggle('rotate-180');
    };

    // --- 갤럭시(Android) 앱 설치 여부 확인 로직 ---
    if (currentCompatibility.includes('Galaxy')) {
      const checkAndApplyOpenStatus = () => {
        const targetApp = APPS.find(a => a.id === 'enjoy_sports');
        if (targetApp) {
          targetApp.buttonText = '열기';
          renderMain(); // 메인 화면 버튼 업데이트
          if (selectedApp && selectedApp.id === targetApp.id) renderModal(); // 모달이 열려있다면 모달 버튼도 업데이트
        }
      };
      
      // 안드로이드 웹 표준 API를 사용하여 설치된 앱 감지 (실제 서비스 시 서버에 assetlinks.json 필요)
      if ('getInstalledRelatedApps' in navigator) {
        navigator.getInstalledRelatedApps().then(apps => {
          // 설치가 확인되면 '열기'로 변경 (현재는 테스트를 위해 무조건 작동하도록 시뮬레이션)
          checkAndApplyOpenStatus();
        }).catch(e => console.error(e));
      } else {
        // 구형 브라우저 등 API 미지원 환경 시뮬레이션
        checkAndApplyOpenStatus();
      }
    }

    // --- 초기 렌더링 ---
    renderAll();
  </script>
</body>
</html>
